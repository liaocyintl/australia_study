<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市指南 - 澳大利亚留学指南</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cities.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html">🇦🇺 澳大利亚留学指南</a></div>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="universities.html">大学地图</a></li>
                <li><a href="cities.html" class="active">城市指南</a></li>
                <li><a href="work.html">打工指南</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero-small">
        <h1>澳洲城市指南</h1>
        <p>了解每座城市的生活成本、支柱产业与留学优势</p>
    </section>

    <section class="section">
        <div class="container-wide">
            <div class="sort-bar">
                <span class="sort-label">排序方式：</span>
                <button class="sort-btn active" data-sort="population">人口</button>
                <button class="sort-btn" data-sort="rent">租金（低→高）</button>
                <button class="sort-btn" data-sort="income">收入</button>
                <button class="sort-btn" data-sort="cost">生活成本（低→高）</button>
            </div>
            <div id="city-cards" class="city-cards"></div>
        </div>
    </section>

    <section class="section section-alt">
        <div class="container-wide">
            <h2>城市生活成本对比</h2>
            <div id="cost-compare" class="cost-compare"></div>
            <p class="cost-note">* 所有费用为澳元（AUD），数据为近似参考值，实际费用因个人消费习惯而异。</p>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 澳大利亚留学指南 | 仅供参考，具体信息请以官方为准</p>
        </div>
    </footer>

    <script src="cities.js"></script>
</body>
</html>
