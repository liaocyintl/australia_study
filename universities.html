<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳洲大学地图 - 澳大利亚留学指南</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="universities.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html">🇦🇺 澳大利亚留学指南</a></div>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="universities.html" class="active">大学地图</a></li>
                <li><a href="cities.html">城市指南</a></li>
            </ul>
        </nav>
    </header>

    <section class="section">
        <div class="container-wide">
            <h2>澳洲大学地图</h2>
            <div class="filter-bar">
                <button class="filter-btn active" data-group="all">全部</button>
                <button class="filter-btn" data-group="Go8">八大名校 (Go8)</button>
                <button class="filter-btn" data-group="ATN">科技联盟 (ATN)</button>
                <button class="filter-btn" data-group="IRU">创新研究 (IRU)</button>
                <button class="filter-btn" data-group="RUN">区域联盟 (RUN)</button>
                <button class="filter-btn" data-group="other">其他大学</button>
            </div>
            <div class="map-layout">
                <div id="map"></div>
                <div id="uni-list" class="uni-list"></div>
            </div>
        </div>
    </section>

    <section class="section section-alt">
        <div class="container">
            <h2>各分组费用概览</h2>
            <div id="cost-summary"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 澳大利亚留学指南 | 仅供参考，具体信息请以官方为准</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="universities.js"></script>
</body>
</html>
