<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳大利亚留学指南</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="#/">🇦🇺 澳大利亚留学指南</a></div>
            <button class="menu-toggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="#/" data-route="">大学地图</a></li>
                <li><a href="#/cities" data-route="cities">城市指南</a></li>
                <li><a href="#/work" data-route="work">打工指南</a></li>
                <li><a href="#/career" data-route="career">就业指南</a></li>
                <li><a href="#/lifestyle" data-route="lifestyle">澳洲生活</a></li>
            </ul>
        </nav>
    </header>

    <main id="page-content"></main>

    <footer>
        <div class="container">
            <p>&copy; 2026 澳大利亚留学指南 | 仅供参考，具体信息请以官方为准</p>
        </div>
    </footer>

    <script>
    // Mobile menu toggle
    document.querySelector('.menu-toggle').addEventListener('click', function() {
        this.classList.toggle('open');
        document.querySelector('.nav-links').classList.toggle('open');
    });
    // Close menu on nav click
    document.querySelectorAll('.nav-links a').forEach(a => {
        a.addEventListener('click', () => {
            document.querySelector('.menu-toggle').classList.remove('open');
            document.querySelector('.nav-links').classList.remove('open');
        });
    });
    </script>
    <script type="module" src="js/router.js"></script>
</body>
</html>
